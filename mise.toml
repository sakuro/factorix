[tools]
go = "1.26"
golangci-lint = "2"
goreleaser = "2"

[env]
_.file = ".env"

[tasks.test]
description = "Run Go tests"
run = "go test ./..."

[tasks.e2e]
description = "Run the e2e cases against a freshly built binary"
# -count=1 because the driver builds the binary from source at run time,
# which the go test cache cannot see.
run = "go test -count=1 ./e2e/"

[tasks.vet]
description = "Run go vet"
run = "go vet ./..."

[tasks.lint]
description = "Run golangci-lint (includes staticcheck)"
run = "golangci-lint run ./..."

[tasks.fmt-check]
description = "Check gofmt formatting"
run = "test -z \"$(gofmt -l .)\""

[tasks.fmt]
description = "Format Go files"
run = "gofmt -w ."

[tasks.build]
description = "Build the factorix binary"
run = "go build -o factorix ./cmd/factorix"

[tasks.release-snapshot]
description = "Build release archives for all platforms without publishing"
run = "goreleaser release --snapshot --clean --skip=publish"

[tasks.default]
description = "Run all Go checks (test + e2e + vet + lint + fmt-check)"
depends = ["test", "e2e", "vet", "lint", "fmt-check"]
