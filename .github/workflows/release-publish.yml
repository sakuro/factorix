name: Release Publish

# This workflow builds and publishes factorix binaries with goreleaser
# after a release PR is merged. Most validations are already performed by
# the Release Validation workflow.

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  publish-release:
    if: github.event.pull_request.merged == true && startsWith(github.head_ref, 'release-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write      # Required for GitHub Release creation

    environment: release   # Manual approval gate before a real release fires

    steps:
    - name: Extract version from branch name
      id: version
      env:
        BRANCH_NAME: ${{ github.head_ref }}
      run: |
        VERSION=${BRANCH_NAME#release-v}
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

    - name: Checkout release tag
      uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      with:
        ref: ${{ steps.version.outputs.tag }}
        fetch-depth: 0

    - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
      with:
        go-version-file: go.mod

    - name: Extract changelog for this version
      run: |
        sed -e "1,/^## \[${{ steps.version.outputs.version }}\] /d" CHANGELOG.md | sed -e '/^## \[/,$d' > "$RUNNER_TEMP/release_notes.md"

    - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7
      with:
        version: v2.17.0
        args: release --clean --release-notes=${{ runner.temp }}/release_notes.md
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Post-release summary
      run: |
        echo "🎉 Release ${{ steps.version.outputs.tag }} published successfully!"
        echo "- Binaries built for all supported platforms and uploaded via goreleaser"
        echo "- GitHub release created with changelog and assets"
