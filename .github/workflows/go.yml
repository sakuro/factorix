name: Go

on:
  push:
    branches:
      - go-rewrite
  pull_request:
    branches:
      - go-rewrite

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
      - name: Test
        run: go test ./...
