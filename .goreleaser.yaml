version: 2

builds:
  - main: ./cmd/factorix
    binary: factorix
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/sakuro/factorix/internal/cli.Version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt
