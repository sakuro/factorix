version: 2

# The GitHub Release itself is cut by the release-publish workflow after a
# release-vX.Y.Z PR is merged (see release-preparation.yml and
# release-validation.yml for the rest of the release process). Validate
# this config without publishing via `mise run release-snapshot`.

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/factorix
    binary: factorix
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/sakuro/factorix/internal/cli.Version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      # Windows on arm64 is not a supported Factorio platform.
      - goos: windows
        goarch: arm64

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE.txt
      - README.md
      - doc/factorix.1

checksum:
  name_template: checksums.txt

changelog:
  disable: true # CHANGELOG.md is maintained by hand; goreleaser should not regenerate it.

release:
  github:
    owner: sakuro
    name: factorix
