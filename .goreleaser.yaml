version: 2

# The GitHub Release itself is cut by the release-publish workflow after a
# release-vX.Y.Z PR is merged (see release-preparation.yml and
# release-validation.yml for the rest of the release process). Validate
# this config without publishing via `mise run release-snapshot`.

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/factorix
    binary: factorix
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/sakuro/factorix/internal/cli.Version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      # Windows on arm64 is not a supported Factorio platform.
      - goos: windows
        goarch: arm64

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE.txt
      - README.md
      - doc/factorix.1

checksum:
  name_template: checksums.txt

# CHANGELOG.md is maintained by hand, so goreleaser should never generate
# its own changelog from git log — but changelog.disable: true also makes
# goreleaser ignore --release-notes=FILE and post an empty release body,
# which is how release-publish.yml supplies the CHANGELOG.md excerpt. Leave
# changelog unset (default) so --release-notes continues to work; it's
# release-publish.yml's job to always pass that flag for a real release.

release:
  github:
    owner: sakuro
    name: factorix
